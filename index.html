<!DOCTYPE html>
<html>
<head>
  <title>Tidipaga App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
</head>

<style>
body {
    background-color: #0f172a;
    color: #e2e8f0;
    font-family: Arial, sans-serif;
}

h1, h2, h3 {
    color: #38bdf8;
}

input, select, button {
    background-color: #1e293b;
    color: #e2e8f0;
    border: 1px solid #334155;
    padding: 6px;
    border-radius: 6px;
}

button:hover {
    background-color: #334155;
}

#historialCayo div, #historialExtra div {
    background-color: #1e293b;
    margin-bottom: 6px;
    padding: 6px;
    border-radius: 6px;
}
</style>

<body>

<h2>Registro Tidipaga</h2>

<h3>Resumen</h3>
<div>

<strong>Total General:</strong> $<span id="totalGeneral">0</span><br>
<strong>Total Extras:</strong> $<span id="totalExtras">0</span><br><br>

<strong>Total Millones:</strong> <span id="millonesTotales">0</span>M<br>
<span id="dineroMillones" style="font-size:12px; color:#94a3b8;">($0)</span><br><br>

<strong>Total Millones con Córnea:</strong> <span id="millonesCornea">0</span>M<br>
<span id="dineroCornea" style="font-size:12px; color:#94a3b8;">($0)</span><br><br>

<strong>Total de Entregas:</strong> <span id="totalEntregas">0</span><br>
<strong>Entregas con Córnea:</strong> <span id="entregasCornea">0</span>

</div>

<br>

<label>Fecha:</label>
<input type="date" id="fechaRegistro"><br><br>

<h3>Cayo</h3>

<label>Millones:</label>
<input type="number" id="millones"><br><br>

<label>Tipo:</label>
<select id="tipo">
<option value="grupal">Grupal</option>
<option value="solitario">Solitario</option>
</select><br><br>

<div id="contenedorSocio">
<label>Socio:</label>
<select id="socio">
<option value="cornea">Córnea</option>
<option value="otros">Otros</option>
</select><br><br>
</div>

<button onclick="calcular()">Registrar Cayo</button>

<h3>Ingresos Extra</h3>

<label>Monto:</label>
<input type="number" id="montoExtra"><br><br>

<label>Concepto:</label>
<input type="text" id="conceptoExtra"><br><br>

<button onclick="registrarExtra()">Agregar ingreso</button>

<br><br>

<button onclick="limpiarTodo()">Borrar todo</button>

<h3 id="resultado"></h3>

<script src="app.js"></script>

<h3>Filtros</h3>

<label>Periodo:</label>
<select id="filtroPeriodo">
<option value="total">TOTAL</option>
<option value="mes">Mes</option>
<option value="quincena">Quincena</option>
<option value="personalizado">Personalizado</option>
</select>

<div id="contenedorMes">
<input type="month" id="filtroMes">
</div>

<div id="contenedorQuincena" style="display:none;">
<input type="month" id="filtroMesQuincena">
<select id="filtroNumeroQuincena">
<option value="1">Primera (1-15)</option>
<option value="2">Segunda (16-fin)</option>
</select>
</div>

<div id="contenedorPersonalizado" style="display:none;">
Desde: <input type="date" id="fechaInicio">
Hasta: <input type="date" id="fechaFin">
</div>

<br>

<label>Tipo:</label>
<select id="filtroTipo">
<option value="total">Total</option>
<option value="grupal">Grupal</option>
<option value="solitario">Solitario</option>
</select>

<br><br>

<button onclick="aplicarFiltros()">Aplicar filtros</button>
<button onclick="resetFiltros()">Limpiar filtros</button>

<h2>Historial</h2>

<h3>Cayos</h3>
<div id="historialCayo"></div>

<h3>Extras</h3>
<div id="historialExtra"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
